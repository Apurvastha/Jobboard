components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - slug
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        website:
          type: string
          format: uri
          maxLength: 200
        country:
          type: string
          maxLength: 100
      required:
      - id
      - name
    CustomTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    ExperienceLevelEnum:
      enum:
      - junior
      - mid
      - senior
      type: string
      description: |-
        * `junior` - Junior
        * `mid` - Mid
        * `senior` - Senior
    JobListing:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        company:
          allOf:
          - $ref: '#/components/schemas/Company'
          readOnly: true
        company_id:
          type: integer
          writeOnly: true
          nullable: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        category_id:
          type: integer
          writeOnly: true
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        job_type:
          $ref: '#/components/schemas/JobTypeEnum'
        experience_level:
          $ref: '#/components/schemas/ExperienceLevelEnum'
        location:
          type: string
          maxLength: 200
        is_remote:
          type: boolean
        salary_min:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        salary_max:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        is_active:
          type: boolean
          readOnly: true
        deadline:
          type: string
          format: date
          nullable: true
        posted_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        application_count:
          type: string
          readOnly: true
        salary_range:
          type: string
          readOnly: true
      required:
      - application_count
      - category
      - company
      - description
      - id
      - is_active
      - location
      - posted_at
      - salary_range
      - tags
      - title
      - updated_at
    JobListingList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        company_name:
          type: string
          readOnly: true
        category_name:
          type: string
          readOnly: true
          nullable: true
        job_type:
          $ref: '#/components/schemas/JobTypeEnum'
        experience_level:
          $ref: '#/components/schemas/ExperienceLevelEnum'
        location:
          type: string
          maxLength: 200
        is_remote:
          type: boolean
        salary_min:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        salary_max:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        posted_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category_name
      - company_name
      - id
      - location
      - posted_at
      - tags
      - title
    JobTypeEnum:
      enum:
      - full_time
      - part_time
      - contract
      - internship
      type: string
      description: |-
        * `full_time` - Full Time
        * `part_time` - Part Time
        * `contract` - Contract
        * `internship` - Internship
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedJobListingListList:
      type: object
      properties:
        count:
          type: integer
        total_pages:
          type: integer
        current_page:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/JobListingList'
    PatchedJobListing:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        company:
          allOf:
          - $ref: '#/components/schemas/Company'
          readOnly: true
        company_id:
          type: integer
          writeOnly: true
          nullable: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        category_id:
          type: integer
          writeOnly: true
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        job_type:
          $ref: '#/components/schemas/JobTypeEnum'
        experience_level:
          $ref: '#/components/schemas/ExperienceLevelEnum'
        location:
          type: string
          maxLength: 200
        is_remote:
          type: boolean
        salary_min:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        salary_max:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        is_active:
          type: boolean
          readOnly: true
        deadline:
          type: string
          format: date
          nullable: true
        posted_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        application_count:
          type: string
          readOnly: true
        salary_range:
          type: string
          readOnly: true
    RegisterCandidate:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
        password2:
          type: string
          writeOnly: true
      required:
      - password
      - password2
      - username
    RegisterCompany:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
