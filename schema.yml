openapi: 3.0.3
info:
  title: JobBoard API
  version: 1.0.0
  description: "\n        A production-ready job board REST API built with Django
    and DRF.\n        \n        Features\n        - JWT authentication with role-based
    access (company / candidate / admin)\n        - Job listing CRUD with advanced
    filtering and full-text search\n        - Application tracking system\n        -
    Redis caching for performance\n        - Dockerized with PostgreSQL and Redis\n
    \   "
paths:
  /api/v1/accounts/me/:
    get:
      operationId: accounts_me_retrieve
      summary: Get current user
      tags:
      - Profile
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/accounts/profile/candidate/:
    get:
      operationId: accounts_profile_candidate_retrieve
      summary: Candidate Profile
      tags:
      - Profile
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: accounts_profile_candidate_partial_update
      summary: Edit Candidate Profile
      tags:
      - Profile
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/accounts/profile/company/:
    get:
      operationId: accounts_profile_company_retrieve
      summary: Company Profile
      tags:
      - Profile
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: accounts_profile_company_partial_update
      summary: Edit Company Profile
      tags:
      - Profile
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/accounts/register/candidate/:
    post:
      operationId: accounts_register_candidate_create
      summary: Register Candidate
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCandidate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterCandidate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterCandidate'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterCandidate'
          description: ''
  /api/v1/accounts/register/company/:
    post:
      operationId: accounts_register_company_create
      summary: Register Company
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCompany'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterCompany'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterCompany'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterCompany'
          description: ''
  /api/v1/accounts/token/:
    post:
      operationId: accounts_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      summary: Login
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/v1/accounts/token/refresh/:
    post:
      operationId: accounts_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/jobs/:
    get:
      operationId: jobs_list
      description: "\n            Returns a paginated list of active job listings.\n
        \           Supports filtering by location, job type, experience level,\n
        \           salary range, and remote status. Supports full-text search\n            across
        title, description, and company name.\n        "
      summary: List all active job listings
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: category_slug
        schema:
          type: string
      - in: query
        name: experience_level
        schema:
          type: string
          enum:
          - junior
          - mid
          - senior
        description: |-
          * `junior` - Junior
          * `mid` - Mid
          * `senior` - Senior
      - in: query
        name: is_remote
        schema:
          type: boolean
      - in: query
        name: job_type
        schema:
          type: string
          enum:
          - contract
          - full_time
          - internship
          - part_time
        description: |-
          * `full_time` - Full Time
          * `part_time` - Part Time
          * `contract` - Contract
          * `internship` - Internship
      - in: query
        name: location
        schema:
          type: string
      - in: query
        name: max_salary
        schema:
          type: integer
      - in: query
        name: min_salary
        schema:
          type: integer
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Sort by: posted_at, salary_min, salary_max, title. Prefix with
          - for descending.'
        examples:
          HighestPayingFirst:
            value: -salary_max
            summary: Highest paying first
          NewestFirst:
            value: -posted_at
            summary: Newest first
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: posted_after
        schema:
          type: string
          format: date
      - in: query
        name: posted_before
        schema:
          type: string
          format: date
      - in: query
        name: salary_max
        schema:
          type: integer
      - in: query
        name: salary_min
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Search across title, description, and company name
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobListingListList'
          description: ''
    post:
      operationId: jobs_create
      description: Only company accounts can create job listings.
      summary: Create a new job listing
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobListing'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobListing'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobListing'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/jobs/{id}/:
    get:
      operationId: jobs_retrieve
      summary: Get job listing details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job listing.
        required: true
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
          description: ''
    put:
      operationId: jobs_update
      description: Fully updates a job listing. All required fields must be provided.
      summary: Update a job listing
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job listing.
        required: true
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobListing'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobListing'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobListing'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
          description: ''
    patch:
      operationId: jobs_partial_update
      description: Updates only the fields provided in the request.
      summary: Partially update a job listing
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job listing.
        required: true
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedJobListing'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedJobListing'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedJobListing'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListing'
          description: ''
    delete:
      operationId: jobs_destroy
      description: Sets is_active=False instead of deleting from database.
      summary: Soft delete a job listing
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job listing.
        required: true
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/jobs/{id}/similar/:
    get:
      operationId: jobs_similar_list
      description: Returns jobs in the same category as the specified job.
      summary: Get similar job listings
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: category_slug
        schema:
          type: string
      - in: query
        name: experience_level
        schema:
          type: string
          enum:
          - junior
          - mid
          - senior
        description: |-
          * `junior` - Junior
          * `mid` - Mid
          * `senior` - Senior
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job listing.
        required: true
      - in: query
        name: is_remote
        schema:
          type: boolean
      - in: query
        name: job_type
        schema:
          type: string
          enum:
          - contract
          - full_time
          - internship
          - part_time
        description: |-
          * `full_time` - Full Time
          * `part_time` - Part Time
          * `contract` - Contract
          * `internship` - Internship
      - in: query
        name: location
        schema:
          type: string
      - in: query
        name: max_salary
        schema:
          type: integer
      - in: query
        name: min_salary
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: posted_after
        schema:
          type: string
          format: date
      - in: query
        name: posted_before
        schema:
          type: string
          format: date
      - in: query
        name: salary_max
        schema:
          type: integer
      - in: query
        name: salary_min
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobListingListList'
          description: ''
  /api/v1/jobs/categories/:
    get:
      operationId: jobs_categories_list
      description: Returns cached list of all job categories. Cache refreshes every
        hour.
      summary: List all job categories
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
  /api/v1/jobs/featured/:
    get:
      operationId: jobs_featured_list
      description: Returns top 5 highest paying active jobs.
      summary: Get featured job listings
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: category_slug
        schema:
          type: string
      - in: query
        name: experience_level
        schema:
          type: string
          enum:
          - junior
          - mid
          - senior
        description: |-
          * `junior` - Junior
          * `mid` - Mid
          * `senior` - Senior
      - in: query
        name: is_remote
        schema:
          type: boolean
      - in: query
        name: job_type
        schema:
          type: string
          enum:
          - contract
          - full_time
          - internship
          - part_time
        description: |-
          * `full_time` - Full Time
          * `part_time` - Part Time
          * `contract` - Contract
          * `internship` - Internship
      - in: query
        name: location
        schema:
          type: string
      - in: query
        name: max_salary
        schema:
          type: integer
      - in: query
        name: min_salary
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: posted_after
        schema:
          type: string
          format: date
      - in: query
        name: posted_before
        schema:
          type: string
          format: date
      - in: query
        name: salary_max
        schema:
          type: integer
      - in: query
        name: salary_min
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
